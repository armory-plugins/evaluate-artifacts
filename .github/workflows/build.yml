name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    env:
      HARNESS_ARTIFACT_PASSWORD: ${{secrets.HARNESS_ARTIFACTORY_PASSWORD}}
      ORG_GRADLE_PROJECT_harness_artifact_user: '${{secrets.HARNESS_ARTIFACTORY_USER}}'
      ORG_GRADLE_PROJECT_harness_artifact_password: '${{secrets.HARNESS_ARTIFACTORY_PASSWORD}}'
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: |
            17
          distribution: 'zulu'
          cache: 'gradle'
      - name: Fix up git URLs
        if: matrix.service == 'deck-armory'
        run: echo -e '[url "https://github.com/"]\n  insteadOf = "git://github.com/"' >> ~/.gitconfig

      - name: Set up Node
        if: matrix.service == 'deck-armory'
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: run tests
        run: ./gradlew test
      - name: build
        run: ./gradlew -PenableCrossCompilerPlugin=true releaseBundle
